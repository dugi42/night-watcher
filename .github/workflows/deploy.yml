name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []   # runs independently of CI; add "test" here to gate on green tests

    steps:
      # Connect the GitHub Actions runner to your Tailscale network so it can
      # reach the Pi by its Tailscale hostname — no public IP required.
      - name: Connect runner to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          hostname: github-actions-deploy

      # Write the SSH private key to an absolute path.
      # Using ~ in a file path is not reliably expanded by all SSH tools.
      - name: Write SSH key
        run: |
          mkdir -p /home/runner/.ssh
          printf '%s' "${{ secrets.PI_SSH_KEY }}" > /home/runner/.ssh/deploy_key
          chmod 600 /home/runner/.ssh/deploy_key

      # Copy .env to the Pi and run docker compose.
      # Uses native ssh/scp — no third-party action required once Tailscale
      # has connected the runner to the tailnet.
      - name: Deploy to Pi
        env:
          SSH_OPTS: >-
            -i /home/runner/.ssh/deploy_key
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
          TARGET: ${{ secrets.PI_USER }}@${{ secrets.TS_HOSTNAME }}
          TS_AUTHKEY_VAL: ${{ secrets.TS_AUTHKEY }}
          TS_HOSTNAME_VAL: ${{ secrets.TS_HOSTNAME }}
          TS_FQDN_VAL: ${{ secrets.TS_FQDN }}
        run: |
          # Build .env locally from environment variables (safe for any special chars)
          {
            printf 'TS_AUTHKEY=%s\n'  "$TS_AUTHKEY_VAL"
            printf 'TS_HOSTNAME=%s\n' "$TS_HOSTNAME_VAL"
            printf 'TS_FQDN=%s\n'     "$TS_FQDN_VAL"
          } > /tmp/night-watcher.env

          # Copy .env to the Pi — never committed to git, only lives on the device
          scp $SSH_OPTS /tmp/night-watcher.env "${TARGET}:~/night-watcher/.env"

          # Pull latest code and restart the stack
          ssh $SSH_OPTS "${TARGET}" '
            set -e
            cd ~/night-watcher
            git pull --ff-only
            docker compose pull --quiet
            docker compose up -d --build --remove-orphans
          '
