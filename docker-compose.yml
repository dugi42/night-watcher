services:
  webcam:
    build: .
    ports:
      - "8501:8501"
    privileged: true
    group_add:
      - video
    devices:
      # This will mount the webcam to the container.
      # You might need to change /dev/video0 to a different device
      # depending on your system.
      - "/dev/video0:/dev/video0"
    volumes:
      - ./assets:/assets
    environment:
      - PYTHONUNBUFFERED=1
      - CAMERA_DEVICE=/dev/video0
      - YOLO_CONFIG_DIR=/tmp
      - YOLO_MODEL_PATH=/app/models/yolov8n.pt
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - ASSETS_DIR=/assets
