services:
  night-watcher:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    privileged: true
    group_add:
      - video
    devices:
      # Adjust if your camera is not /dev/video0
      - "/dev/video0:/dev/video0"
    volumes:
      # Persist recorded videos and detection metadata on the host
      - ./assets:/assets
    environment:
      - PYTHONUNBUFFERED=1
      - CAMERA_DEVICE=/dev/video0
      - YOLO_CONFIG_DIR=/tmp
      - YOLO_MODEL_PATH=/app/models/yolov8n.pt
      - ASSETS_DIR=/assets
