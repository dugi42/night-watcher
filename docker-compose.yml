services:
  night-watcher:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    privileged: true
    group_add:
      - video
    devices:
      # Adjust if your camera is not /dev/video0
      - "/dev/video0:/dev/video0"
      # VideoCore mailbox — required for vcgencmd to read throttle/voltage status
      - "/dev/vcio:/dev/vcio"
    volumes:
      # Persist recorded videos, detection metadata, and logs on the host
      - ./assets:/assets
      # Docker socket (read-only) so /health/docker can list containers
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # vcgencmd binary from the host so /health/power can query throttle status
      - /usr/bin/vcgencmd:/usr/bin/vcgencmd:ro
      # Sync container timezone with the host so timestamps in the camera
      # overlay and logs reflect local time rather than UTC
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - PYTHONUNBUFFERED=1
      - CAMERA_DEVICE=/dev/video0
      - YOLO_CONFIG_DIR=/tmp
      - YOLO_MODEL_PATH=/app/models/yolo11n.pt
      - ASSETS_DIR=/assets
      # Point the OTel SDK at the collector running in this compose stack
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    depends_on:
      - otel-collector

  # ---------------------------------------------------------------------------
  # Metrics exporter — standalone Prometheus exporter that runs independently
  # of the Streamlit dashboard.  Collects hardware metrics (CPU, memory, disk,
  # temperature, PMIC) plus app counters and SQLite log statistics every 15 s.
  # Prometheus scrapes this service directly on port 9100.
  # ---------------------------------------------------------------------------
  metrics-exporter:
    build: .
    restart: unless-stopped
    command: python -m src.exporter
    ports:
      - "9100:9100"
    devices:
      - "/dev/vcio:/dev/vcio"
    volumes:
      - ./assets:/assets
      - /usr/bin/vcgencmd:/usr/bin/vcgencmd:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - PYTHONUNBUFFERED=1
      - ASSETS_DIR=/assets
      - NIGHT_WATCHER_URL=http://night-watcher:8000
      - COLLECT_INTERVAL=15
      - EXPORTER_PORT=9100
    depends_on:
      - night-watcher

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector — receives OTLP from the app, exposes Prometheus
  # scrape endpoint on :9464, writes trace/log data to stdout for debugging.
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "9464:9464"   # Prometheus scrape endpoint (metrics)
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro

  # ---------------------------------------------------------------------------
  # Prometheus — scrapes OTel Collector metrics; stores time-series data.
  # Dashboard: https://<tailscale-host>/prometheus
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      # Serve UI at /prometheus/ so nginx can proxy it at a subpath
      - "--web.route-prefix=/prometheus"
      - "--web.external-url=http://localhost/prometheus"

  # ---------------------------------------------------------------------------
  # Streamlit dashboard — runs on the Pi, accessible from any browser on the
  # LAN at http://<pi-hostname>:8501, and over Tailscale at https://<ts-host>/.
  #
  # PUBLIC_RASPI_URL / GRAFANA_URL are browser-visible URLs derived from
  # TS_FQDN so stream, video, and Grafana panel links work over HTTPS.
  # Set TS_FQDN in .env after Tailscale connects (see .env.example).
  # ---------------------------------------------------------------------------
  dashboard:
    build: .
    restart: unless-stopped
    command: >
      streamlit run app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - RASPI_URL=http://night-watcher:8000
      - PROMETHEUS_URL=http://prometheus:9090
      # Browser-visible HTTPS URLs for the Tailscale tunnel.
      # TS_FQDN is read from .env — set it to your Tailscale FQDN.
      - PUBLIC_RASPI_URL=https://${TS_FQDN:-raspberrypi.local}/api
      - GRAFANA_URL=https://${TS_FQDN:-raspberrypi.local}/grafana
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      - night-watcher
      - grafana

  # ---------------------------------------------------------------------------
  # Grafana — dashboards and alerting on top of Prometheus.
  # Dashboard: https://<tailscale-host>/grafana
  # Default admin credentials: admin / nightwatcher
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=nightwatcher
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_BASIC_ENABLED=true
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      # Serve Grafana at the /grafana/ subpath so nginx can proxy it cleanly
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      # Auto-provision datasources (Prometheus + Loki) on first start
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  # ---------------------------------------------------------------------------
  # Loki — log aggregation backend.
  # Grafana uses Loki as a datasource for log exploration (Explore → Loki).
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yaml

  # ---------------------------------------------------------------------------
  # Promtail — log shipper.
  # Discovers all running containers via the Docker socket and ships their
  # stdout/stderr logs to Loki, labelled by container and service name.
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    volumes:
      - ./promtail/config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Promtail needs to read the actual log files on the host
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki

  # ---------------------------------------------------------------------------
  # Tailscale — VPN agent + TLS certificate provider.
  #
  # Connects the Pi to your Tailscale network and issues a TLS certificate
  # for the Tailscale hostname via `tailscale cert`.  The cert is written to
  # the shared `certs` volume that nginx reads.
  #
  # Prerequisites on the Pi host:
  #   sudo tailscale up   (initial auth — only needed once if already logged in)
  #
  # Required environment variables — injected by the deploy workflow from
  # GitHub Secrets (TS_AUTHKEY, TS_HOSTNAME, TS_FQDN).
  # On the Pi the workflow writes them to a gitignored .env file before
  # running `docker compose up`.  See .github/workflows/deploy.yml.
  #
  # HTTPS Certificates must be enabled in the Tailscale admin console:
  #   DNS → Enable HTTPS Certificates
  # ---------------------------------------------------------------------------
  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    hostname: ${TS_HOSTNAME:-night-watcher-pi}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=${TS_HOSTNAME:-night-watcher-pi}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - tailscale_state:/var/lib/tailscale
      - certs:/certs
      - /dev/net/tun:/dev/net/tun
      - ./scripts/tailscale-start.sh:/start.sh:ro
    command: /bin/sh /start.sh

  # ---------------------------------------------------------------------------
  # nginx — TLS reverse proxy.
  #
  # Terminates TLS using the Tailscale-issued certificate and routes all
  # services behind a single HTTPS endpoint:
  #   /           → Streamlit dashboard  (:8501)
  #   /grafana/   → Grafana              (:3000)
  #   /api/       → Night Watcher API    (:8000)
  #   /prometheus/ → Prometheus          (:9090)
  #
  # Port 443 is the only port that needs to be accessible externally (via
  # Tailscale).  Port 80 redirects to HTTPS.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/certs:ro
    depends_on:
      - tailscale
      - dashboard
      - grafana
      - night-watcher
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  tailscale_state:
  certs:
