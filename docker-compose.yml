services:
  night-watcher:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    privileged: true
    group_add:
      - video
    devices:
      # Adjust if your camera is not /dev/video0
      - "/dev/video0:/dev/video0"
      # VideoCore mailbox — required for vcgencmd to read throttle/voltage status
      - "/dev/vcio:/dev/vcio"
    volumes:
      # Persist recorded videos, detection metadata, and logs on the host
      - ./assets:/assets
      # Docker socket (read-only) so /health/docker can list containers
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # vcgencmd binary from the host so /health/power can query throttle status
      - /usr/bin/vcgencmd:/usr/bin/vcgencmd:ro
      # Sync container timezone with the host so timestamps in the camera
      # overlay and logs reflect local time rather than UTC
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - PYTHONUNBUFFERED=1
      - CAMERA_DEVICE=/dev/video0
      - YOLO_CONFIG_DIR=/tmp
      - YOLO_MODEL_PATH=/app/models/yolo11n.pt
      - ASSETS_DIR=/assets
      # Point the OTel SDK at the collector running in this compose stack
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    depends_on:
      - otel-collector

  # ---------------------------------------------------------------------------
  # Metrics exporter — standalone Prometheus exporter that runs independently
  # of the Streamlit dashboard.  Collects hardware metrics (CPU, memory, disk,
  # temperature, PMIC) plus app counters and SQLite log statistics every 15 s.
  # Prometheus scrapes this service directly on port 9100.
  # ---------------------------------------------------------------------------
  metrics-exporter:
    build: .
    restart: unless-stopped
    command: python -m src.exporter
    ports:
      - "9100:9100"
    devices:
      - "/dev/vcio:/dev/vcio"
    volumes:
      - ./assets:/assets
      - /usr/bin/vcgencmd:/usr/bin/vcgencmd:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - PYTHONUNBUFFERED=1
      - ASSETS_DIR=/assets
      - NIGHT_WATCHER_URL=http://night-watcher:8000
      - COLLECT_INTERVAL=15
      - EXPORTER_PORT=9100
    depends_on:
      - night-watcher

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector — receives OTLP from the app, exposes Prometheus
  # scrape endpoint on :9464, writes trace/log data to stdout for debugging.
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "9464:9464"   # Prometheus scrape endpoint (metrics)
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro

  # ---------------------------------------------------------------------------
  # Prometheus — scrapes OTel Collector metrics; stores time-series data.
  # Dashboard: http://<pi-host>:9090
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  # ---------------------------------------------------------------------------
  # Streamlit dashboard — runs on the Pi, accessible from any browser on the
  # LAN at http://<pi-hostname>:8501.
  #
  # RASPI_URL and GRAFANA_URL must use the Pi's public hostname (not the Docker
  # internal service name) because these URLs are embedded in the browser for
  # the MJPEG stream, video playback, and Grafana links.
  # ---------------------------------------------------------------------------
  dashboard:
    build: .
    restart: unless-stopped
    command: >
      streamlit run app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - RASPI_URL=http://raspberrypi.local:8000
      - PROMETHEUS_URL=http://prometheus:9090
      - GRAFANA_URL=http://raspberrypi.local:3000
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      - night-watcher
      - grafana

  # ---------------------------------------------------------------------------
  # Grafana — dashboards and alerting on top of Prometheus.
  # Dashboard: http://<pi-host>:3000
  # Default admin credentials: admin / nightwatcher
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=nightwatcher
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_BASIC_ENABLED=true
      - GF_AUTH_DISABLE_LOGIN_FORM=false
    volumes:
      # Auto-provision the Prometheus datasource on first start
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
