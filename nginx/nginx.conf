# Night Watcher — nginx TLS reverse proxy
#
# All services are exposed through a single HTTPS endpoint served by nginx.
# The TLS certificate is issued by Tailscale (see scripts/tailscale-start.sh)
# and written to the shared `certs` Docker volume.
#
# Routing table:
#   /          → Streamlit dashboard   (dashboard:8501)  — WebSocket support
#   /grafana/  → Grafana               (grafana:3000)     — GF_SERVER_SERVE_FROM_SUB_PATH required
#   /api/      → Night Watcher FastAPI (night-watcher:8000) — /api prefix stripped
#   /prometheus/ → Prometheus          (prometheus:9090)  — --web.route-prefix=/prometheus required

# Redirect plain HTTP to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /certs/cert.pem;
    ssl_certificate_key /certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---------------------------------------------------------------------------
    # Streamlit dashboard — must be last so more-specific paths match first.
    # Streamlit uses WebSockets for live updates and component state.
    # ---------------------------------------------------------------------------
    location / {
        proxy_pass          http://dashboard:8501;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade            $http_upgrade;
        proxy_set_header    Connection         "upgrade";
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  https;
        proxy_read_timeout  86400;
    }

    # ---------------------------------------------------------------------------
    # Grafana — served at /grafana/ subpath.
    # Requires GF_SERVER_SERVE_FROM_SUB_PATH=true in Grafana config.
    # The full /grafana path is forwarded to Grafana (no prefix stripping).
    # ---------------------------------------------------------------------------
    location /grafana {
        proxy_pass          http://grafana:3000;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  https;
    }

    # ---------------------------------------------------------------------------
    # Night Watcher FastAPI — strip /api/ prefix before forwarding.
    # Browser stream/video URLs become https://<host>/api/stream, /api/video/...
    # ---------------------------------------------------------------------------
    location /api/ {
        proxy_pass          http://night-watcher:8000/;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  https;
        # MJPEG and video streams are long-lived
        proxy_read_timeout  86400;
        proxy_buffering     off;
    }

    # ---------------------------------------------------------------------------
    # Prometheus — nginx strips the /prometheus prefix before forwarding so
    # Prometheus runs at its default / path with no --web.route-prefix needed.
    # Trailing slashes on both sides tell nginx to perform the prefix strip.
    # A redirect handles /prometheus → /prometheus/ so bare links still work.
    # ---------------------------------------------------------------------------
    location = /prometheus {
        return 301 https://$host/prometheus/;
    }
    location /prometheus/ {
        proxy_pass          http://prometheus:9090/;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  https;
    }
}
