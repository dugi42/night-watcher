# Prometheus scrape configuration for Night Watcher
#
# Scrapes the OpenTelemetry Collector's Prometheus exporter endpoint.
# Access the Prometheus UI at http://<pi-host>:9090

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    host: night-watcher-pi

scrape_configs:
  - job_name: night_watcher
    static_configs:
      - targets: ["otel-collector:9464"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: night-watcher
